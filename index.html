<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xoorix — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0e1a;
      --bg-mid: #0f1629;
      --accent-blue: #2d3b5e;
      --accent-orange: #f97316;
      --accent-orange-glow: rgba(249, 115, 22, 0.4);
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --grid-color: rgba(45, 59, 94, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* Decorative Background */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      opacity: 0.6;
    }

    .gradient-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .gradient-orb-1 { top: -200px; left: -200px; background: var(--accent-orange); }
    .gradient-orb-2 { bottom: -200px; right: -200px; background: var(--accent-blue); }

    /* Layout */
    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }

    .logo-wrap { margin-bottom: 3rem; }
    .logo-wrap img { height: 56px; width: auto; display: block; }

    .tagline {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .headline {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Countdown Styling */
    .countdown {
      display: flex;
      flex-wrap: nowrap;
      gap: clamp(0.5rem, 2vw, 2rem);
      justify-content: center;
      margin-bottom: 3rem;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: clamp(65px, 15vw, 90px);
    }

    .unit-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.8rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-primary);
      text-shadow: 0 0 40px var(--accent-orange-glow);
      padding: 0.5rem 0.25rem;
      border: 1px solid var(--grid-color);
      border-radius: 8px;
      background: rgba(15, 22, 41, 0.7);
      backdrop-filter: blur(8px);
      width: 100%;
    }

    .unit-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .countdown-intro {
      font-size: clamp(0.9rem, 2.5vw, 1.25rem);
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .countdown-intro span { color: var(--text-primary); font-weight: 600; }

    .divider {
      width: 1px;
      height: 40px;
      align-self: center;
      background: linear-gradient(to bottom, transparent, var(--accent-orange), transparent);
      opacity: 0.4;
    }

    .footer-note { font-size: 0.85rem; color: var(--text-muted); margin-top: 2rem; }
    .footer-note a { color: var(--accent-orange); text-decoration: none; }

    @media (max-width: 480px) {
      .divider { display: none; }
      .countdown { gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-1" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-2" aria-hidden="true"></div>

  <main class="container">
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="xoorix" width="180" height="56">
    </div>
    <p class="tagline">Next generation</p>
    <h1 class="headline">Something highly tech is coming</h1>

    <p class="countdown-intro">
      🚀 Countdown: <span id="countdown-text" aria-live="polite">3 days 7 hours 43 minutes</span> left
    </p>
    
    <div class="countdown" role="timer">
      <div class="unit">
        <span class="unit-value" id="days">03</span>
        <span class="unit-label">Days</span>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="unit">
        <span class="unit-value" id="hours">07</span>
        <span class="unit-label">Hours</span>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="unit">
        <span class="unit-value" id="minutes">43</span>
        <span class="unit-label">Minutes</span>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="unit">
        <span class="unit-value" id="seconds">00</span>
        <span class="unit-label">Seconds</span>
      </div>
    </div>

    <p class="footer-note">
      You’ll be redirected to <a href="https://xoorix.com">xoorix.com</a> when we’re live.
    </p>
  </main>

  <script>
    (function () {
      /**
       * FIXED LAUNCH DATE: March 15, 2026, 10:31:00 UTC
       * This is approximately 3 days, 7 hours, and 43 minutes from now (March 12, 02:48 UTC).
       * Using a fixed string ensures it does NOT reset on refresh.
       */
      const launchDate = new Date("2026-03-15T10:31:00Z").getTime();

      const els = {
        days: document.getElementById('days'),
        hours: document.getElementById('hours'),
        minutes: document.getElementById('minutes'),
        seconds: document.getElementById('seconds'),
        text: document.getElementById('countdown-text')
      };

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        const now = new Date().getTime();
        const diff = launchDate - now;

        // On completion: redirect to main site
        if (diff <= 0) {
          window.location.replace('https://xoorix.com');
          return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        // Performance Check: Only update DOM if text actually changed
        if (els.days.textContent !== pad(d)) els.days.textContent = pad(d);
        if (els.hours.textContent !== pad(h)) els.hours.textContent = pad(h);
        if (els.minutes.textContent !== pad(m)) {
          els.minutes.textContent = pad(m);
          // Accessibility: Update text string for screen readers every minute
          els.text.textContent = `${d} day${d!==1?'s':''} ${h} hour${h!==1?'s':''} ${m} minute${m!==1?'s':''}`;
        }
        els.seconds.textContent = pad(s);
      }

      // Initial run and set interval
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
