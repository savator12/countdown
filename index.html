<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xoorix — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0e1a;
      --bg-mid: #0f1629;
      --accent-blue: #2d3b5e;
      --accent-orange: #f97316;
      --accent-orange-glow: rgba(249, 115, 22, 0.4);
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --grid-color: rgba(45, 59, 94, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* Grid overlay */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      opacity: 0.6;
    }

    .gradient-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .gradient-orb-1 {
      top: -200px;
      left: -200px;
      background: var(--accent-orange);
    }
    .gradient-orb-2 {
      bottom: -200px;
      right: -200px;
      background: var(--accent-blue);
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 3rem;
    }
    .logo-wrap img {
      height: 56px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .tagline {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .headline {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .countdown {
      display: flex;
      flex-wrap: wrap;
      gap: clamp(1rem, 3vw, 2rem);
      justify-content: center;
      margin-bottom: 3rem;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
    }

    .unit-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-primary);
      text-shadow: 0 0 40px var(--accent-orange-glow);
      padding: 0.5rem 1rem;
      border: 1px solid var(--grid-color);
      border-radius: 8px;
      background: rgba(15, 22, 41, 0.7);
      backdrop-filter: blur(8px);
    }

    .unit-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .countdown-intro {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      letter-spacing: 0.02em;
    }
    .countdown-intro span {
      color: var(--text-primary);
      font-weight: 600;
    }

    .divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent-orange), transparent);
      opacity: 0.6;
    }

    .footer-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2rem;
    }

    .footer-note a {
      color: var(--accent-orange);
      text-decoration: none;
      transition: text-shadow 0.2s;
    }
    .footer-note a:hover {
      text-shadow: 0 0 12px var(--accent-orange-glow);
    }

    @media (max-width: 600px) {
      .countdown { gap: 1rem; }
      .unit { min-width: 70px; }
      .divider { display: none; }
    }

    /* Celebration overlay */
    .celebration {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease, visibility 0.5s;
    }
    .celebration.active {
      opacity: 1;
      visibility: visible;
    }
    .celebration-message {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 700;
      color: var(--text-primary);
      text-shadow: 0 0 60px var(--accent-orange-glow), 0 0 20px var(--accent-orange);
      transform: scale(0.3);
      opacity: 0;
      position: relative;
      z-index: 2;
    }
    .celebration.active .celebration-message {
      animation: celebration-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
    }
    @keyframes celebration-pop {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }
    .sparkles-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .sparkle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle-burst 1.2s ease-out forwards;
      opacity: 0;
    }
    .sparkle.star {
      width: 0;
      height: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }
    .sparkle.star::before,
    .sparkle.star::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 6px;
      height: 6px;
      margin: -3px 0 0 -3px;
      background: currentColor;
      border-radius: 1px;
      transform-origin: center;
      box-shadow: 0 0 8px currentColor;
    }
    .sparkle.star::before {
      animation: star-twinkle-0 0.8s ease-in-out forwards;
    }
    .sparkle.star::after {
      animation: star-twinkle-45 0.8s 0.1s ease-in-out forwards;
    }
    @keyframes star-twinkle-0 {
      0% { opacity: 0; transform: rotate(0deg) scale(0); }
      50% { opacity: 1; transform: rotate(0deg) scale(1); }
      100% { opacity: 0; transform: rotate(0deg) scale(1.2); }
    }
    @keyframes star-twinkle-45 {
      0% { opacity: 0; transform: rotate(45deg) scale(0); }
      50% { opacity: 1; transform: rotate(45deg) scale(1); }
      100% { opacity: 0; transform: rotate(45deg) scale(1.2); }
    }
    @keyframes sparkle-burst {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
      }
      40% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0.3);
        opacity: 0;
      }
    }
    .sparkle.dot {
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      box-shadow: 0 0 12px currentColor, 0 0 24px currentColor;
    }
    .sparkle.star {
      width: 12px;
      height: 12px;
      margin-left: -6px;
      margin-top: -6px;
    }

    /* Confetti cannon / party popper */
    .confetti-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .confetti {
      position: absolute;
      width: 10px;
      height: 6px;
      border-radius: 1px;
      opacity: 0;
      transform-origin: center center;
      animation: confetti-fly 2s ease-out forwards;
    }
    .confetti.confetti-round {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .confetti.confetti-long {
      width: 14px;
      height: 4px;
    }
    @keyframes confetti-fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      15% {
        opacity: 1;
      }
      100% {
        opacity: 0.85;
        transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1);
      }
    }
    .popper-burst {
      position: absolute;
      width: 20px;
      height: 20px;
      margin-left: -10px;
      margin-top: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.9) 0%, rgba(249,115,22,0.4) 40%, transparent 70%);
      box-shadow: 0 0 30px var(--accent-orange), 0 0 60px var(--accent-orange-glow);
      opacity: 0;
      animation: popper-flash 0.4s ease-out forwards;
    }
    @keyframes popper-flash {
      0% { opacity: 0; transform: scale(0.3); }
      50% { opacity: 1; transform: scale(1.4); }
      100% { opacity: 0.6; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-1" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-2" aria-hidden="true"></div>

  <div class="celebration" id="celebration" aria-hidden="true">
    <div class="sparkles-wrap" id="sparkles-wrap"></div>
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <p class="celebration-message" id="celebration-message">We're live!</p>
  </div>

  <main class="container">
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="xoorix" width="180" height="56">
    </div>
    <p class="tagline">Next generation</p>
    <h1 class="headline">Something highly tech is coming</h1>

    <p class="countdown-intro" aria-live="polite">
      🚀 Countdown: <span id="countdown-text">3 days 7 hours 43 minutes</span> left
    </p>
    <div class="countdown" role="timer" aria-live="polite">
      <div class="unit">
        <span class="unit-value" id="days">03</span>
        <span class="unit-label">Days</span>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="unit">
        <span class="unit-value" id="hours">07</span>
        <span class="unit-label">Hours</span>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="unit">
        <span class="unit-value" id="minutes">43</span>
        <span class="unit-label">Minutes</span>
      </div>
      <div class="divider" aria-hidden="true"></div>
      <div class="unit">
        <span class="unit-value" id="seconds">00</span>
        <span class="unit-label">Seconds</span>
      </div>
    </div>

    <p class="footer-note">
      You’ll be redirected to <a href="https://xoorix.com" target="_blank" rel="noopener">xoorix.com</a> when we’re live.
    </p>
  </main>

  <script>
    (function () {
      // Fixed launch date – same for everyone, edit to your real launch (Year, Month-1, Day, Hour, Minute, Second)
      var launchDate = new Date(2025, 5, 18, 12, 0, 0); // June 18, 2025, 12:00

      var daysEl = document.getElementById('days');
      var hoursEl = document.getElementById('hours');
      var minutesEl = document.getElementById('minutes');
      var secondsEl = document.getElementById('seconds');
      var countdownTextEl = document.getElementById('countdown-text');
      var ticker = null;

      var colors = ['#f97316', '#fbbf24', '#fcd34d', '#e2e8f0', '#38bdf8'];
      var confettiColors = ['#f97316', '#fb923c', '#fbbf24', '#fcd34d', '#fde047', '#e2e8f0', '#38bdf8', '#818cf8', '#f472b6'];
      var sparkleCount = 70;

      function pad(n) { return String(n).padStart(2, '0'); }
      function formatCountdownText(d, h, m) {
        return d + ' day' + (d !== 1 ? 's' : '') + ' ' + h + ' hour' + (h !== 1 ? 's' : '') + ' ' + m + ' minute' + (m !== 1 ? 's' : '') + ' ';
      }

      function createConfettiCannons() {
        var wrap = document.getElementById('confetti-wrap');
        var centerX = window.innerWidth / 2;
        var centerY = window.innerHeight / 2;
        var popperPositions = [
          { x: centerX - 120, y: centerY - 20 },
          { x: centerX + 120, y: centerY - 20 },
          { x: centerX, y: centerY + 60 }
        ];
        var shapes = ['', ' confetti-round', ' confetti-long'];
        popperPositions.forEach(function (pos, idx) {
          var burstAngle = idx === 0 ? -0.4 : idx === 1 ? -2.74 : -1.57;
          var angleSpread = 1.4;
          var count = 28;
          for (var i = 0; i < count; i++) {
            var angle = burstAngle + (Math.random() - 0.5) * angleSpread;
            var dist = 120 + Math.random() * 220;
            var tx = Math.cos(angle) * dist + (Math.random() - 0.5) * 80;
            var ty = Math.sin(angle) * dist + (Math.random() - 0.5) * 80;
            var rot = (Math.random() - 0.5) * 720;
            var c = document.createElement('div');
            c.className = 'confetti' + shapes[Math.floor(Math.random() * shapes.length)];
            c.style.left = pos.x + 'px';
            c.style.top = pos.y + 'px';
            c.style.setProperty('--tx', tx + 'px');
            c.style.setProperty('--ty', ty + 'px');
            c.style.setProperty('--rot', rot + 'deg');
            c.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            c.style.animationDelay = (Math.random() * 0.25) + 's';
            c.style.animationDuration = (1.6 + Math.random() * 0.8) + 's';
            wrap.appendChild(c);
          }
          var popper = document.createElement('div');
          popper.className = 'popper-burst';
          popper.style.left = pos.x + 'px';
          popper.style.top = pos.y + 'px';
          popper.style.animationDelay = '0s';
          wrap.appendChild(popper);
        });
      }

      function createSparkles() {
        var wrap = document.getElementById('sparkles-wrap');
        var centerX = window.innerWidth / 2;
        var centerY = window.innerHeight / 2;
        for (var i = 0; i < sparkleCount; i++) {
          var s = document.createElement('div');
          var isStar = Math.random() > 0.5;
          s.className = 'sparkle ' + (isStar ? 'star' : 'dot');
          s.style.left = centerX + 'px';
          s.style.top = centerY + 'px';
          var angle = (Math.PI * 2 * i) / sparkleCount + Math.random() * 0.5;
          var dist = 80 + Math.random() * 280;
          var tx = Math.cos(angle) * dist + (Math.random() - 0.5) * 100;
          var ty = Math.sin(angle) * dist + (Math.random() - 0.5) * 100;
          s.style.setProperty('--tx', tx + 'px');
          s.style.setProperty('--ty', ty + 'px');
          s.style.color = colors[Math.floor(Math.random() * colors.length)];
          s.style.animationDelay = (Math.random() * 0.3) + 's';
          wrap.appendChild(s);
        }
      }

      function startCelebration() {
        if (ticker) clearInterval(ticker);
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        if (countdownTextEl) countdownTextEl.textContent = '0 days 0 hours 0 minutes';
        var celebration = document.getElementById('celebration');
        celebration.classList.add('active');
        celebration.setAttribute('aria-hidden', 'false');
        createSparkles();
        createConfettiCannons();
        setTimeout(function () {
          window.location.replace('https://xoorix.com');
        }, 4200);
      }

      function tick() {
        var now = new Date();
        var diff = launchDate - now;
        if (diff <= 0) {
          startCelebration();
          return;
        }
        var d = Math.floor(diff / (1000 * 60 * 60 * 24));
        var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        var s = Math.floor((diff % (1000 * 60)) / 1000);
        daysEl.textContent = pad(d);
        hoursEl.textContent = pad(h);
        minutesEl.textContent = pad(m);
        secondsEl.textContent = pad(s);
        if (countdownTextEl) countdownTextEl.textContent = formatCountdownText(d, h, m).trim();
      }

      tick();
      ticker = setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
