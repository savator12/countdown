<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xoorix — Global Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0e1a;
      --bg-mid: #0f1629;
      --accent-blue: #2d3b5e;
      --accent-orange: #f97316;
      --accent-orange-glow: rgba(249, 115, 22, 0.4);
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --grid-color: rgba(45, 59, 94, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg-deep); color: var(--text-primary); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; opacity: 0.6; }
    .gradient-orb { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; }
    .gradient-orb-1 { top: -200px; left: -200px; background: var(--accent-orange); }
    .gradient-orb-2 { bottom: -200px; right: -200px; background: var(--accent-blue); }

    .container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }
    .logo-wrap { margin-bottom: 3rem; }
    .logo-wrap img { height: 56px; width: auto; display: block; }

    .tagline { font-size: clamp(0.75rem, 2vw, 0.9rem); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    .headline { font-size: clamp(1.5rem, 5vw, 2.25rem); font-weight: 700; letter-spacing: 0.02em; margin-bottom: 3rem; background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-muted) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .countdown { display: flex; gap: clamp(0.5rem, 2vw, 2rem); justify-content: center; margin-bottom: 3rem; }
    .unit { display: flex; flex-direction: column; align-items: center; min-width: clamp(65px, 15vw, 90px); }
    .unit-value { font-family: 'JetBrains Mono', monospace; font-size: clamp(1.8rem, 6vw, 4.5rem); font-weight: 700; line-height: 1.1; color: var(--text-primary); text-shadow: 0 0 40px var(--accent-orange-glow); padding: 0.5rem 0.25rem; border: 1px solid var(--grid-color); border-radius: 8px; background: rgba(15, 22, 41, 0.7); backdrop-filter: blur(8px); width: 100%; }
    .unit-label { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.5rem; }

    .status-badge { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; color: #10b981; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; opacity: 0; transition: opacity 0.5s; }
    .status-badge::before { content: ''; width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

    .divider { width: 1px; height: 40px; align-self: center; background: linear-gradient(to bottom, transparent, var(--accent-orange), transparent); opacity: 0.4; }
    .footer-note { font-size: 0.85rem; color: var(--text-muted); margin-top: 2rem; }
    .footer-note a { color: var(--accent-orange); text-decoration: none; }

    @media (max-width: 480px) { .divider { display: none; } .countdown { gap: 0.5rem; } }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-1" aria-hidden="true"></div>
  <div class="gradient-orb gradient-orb-2" aria-hidden="true"></div>

  <main class="container">
    <div class="logo-wrap"><img src="assets/logo.png" alt="xoorix"></div>
    
    <div class="status-badge" id="sync-status">Global Time Synced</div>

    <p class="tagline">Next generation</p>
    <h1 class="headline">Something highly tech is coming</h1>

    <div class="countdown" role="timer">
      <div class="unit"><span class="unit-value" id="days">--</span><span class="unit-label">Days</span></div>
      <div class="divider"></div>
      <div class="unit"><span class="unit-value" id="hours">--</span><span class="unit-label">Hours</span></div>
      <div class="divider"></div>
      <div class="unit"><span class="unit-value" id="minutes">--</span><span class="unit-label">Minutes</span></div>
      <div class="divider"></div>
      <div class="unit"><span class="unit-value" id="seconds">--</span><span class="unit-label">Seconds</span></div>
    </div>

    <p class="footer-note">Target: March 15, 2026, 10:31:00 UTC</p>
  </main>

  <script>
    (function () {
      const launchDate = new Date("2026-03-15T10:31:00Z").getTime();
      let timeOffset = 0;

      const els = {
        days: document.getElementById('days'),
        hours: document.getElementById('hours'),
        minutes: document.getElementById('minutes'),
        seconds: document.getElementById('seconds'),
        status: document.getElementById('sync-status')
      };

      async function syncWithGlobalTime() {
        try {
          const startTime = Date.now();
          // Fetching from a reliable global time API
          const response = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
          const data = await response.json();
          
          const serverTime = new Date(data.datetime).getTime();
          const endTime = Date.now();
          
          // Calculate round-trip delay to make it even more precise
          const delay = (endTime - startTime) / 2;
          
          // Calculate how much the user's clock differs from the "True" time
          timeOffset = (serverTime + delay) - endTime;
          
          els.status.style.opacity = '1';
        } catch (err) {
          console.warn("Global sync failed. Using local system time.");
          // We don't show the badge if sync fails
        }
      }

      function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

      function tick() {
        // True Time = User's current clock + the recalibration offset
        const trueNow = Date.now() + timeOffset;
        const diff = launchDate - trueNow;

        if (diff <= 0) {
          window.location.replace('https://xoorix.com');
          return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        if (els.days.textContent !== pad(d)) els.days.textContent = pad(d);
        if (els.hours.textContent !== pad(h)) els.hours.textContent = pad(h);
        if (els.minutes.textContent !== pad(m)) els.minutes.textContent = pad(m);
        els.seconds.textContent = pad(s);
      }

      // 1. Start the sync
      syncWithGlobalTime().then(() => {
        // 2. Start the clock only after sync is calculated (or failed)
        tick();
        setInterval(tick, 1000);
      });
    })();
  </script>
</body>
</html>
